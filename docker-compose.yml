# ============================================
# Agent Builder System V5 - Docker Compose
# ============================================
# All services orchestrated via Docker Compose
# Usage: make up | docker-compose up -d
# ============================================

services:
  # -------------------------------------------
  # PostgreSQL + pgvector (Database)
  # -------------------------------------------
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: agentbuilder-db
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------
  # Redis (Message Broker + Cache)
  # -------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agentbuilder-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------
  # FastAPI (API Gateway)
  # -------------------------------------------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: agentbuilder-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./core:/app/core
      - ./orchestrator:/app/orchestrator
      - ./skills:/app/skills
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------
  # Celery Worker (Async Task Processor)
  # -------------------------------------------
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: agentbuilder-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./worker:/app/worker
      - ./core:/app/core
      - ./orchestrator:/app/orchestrator
      - ./skills:/app/skills
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -------------------------------------------
  # Frontend Dashboard (Nginx)
  # -------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentbuilder-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  # -------------------------------------------
  # Adminer (DB Admin - Dev Only)
  # -------------------------------------------
  adminer:
    image: adminer:latest
    container_name: agentbuilder-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    profiles:
      - dev

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
