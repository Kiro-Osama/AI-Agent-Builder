<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Chat | Agent Builder V5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #111128;
            --bg-card: rgba(20, 20, 50, 0.8);
            --border: rgba(124, 58, 237, 0.2);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-dim: #64748b;
            --accent-purple: #7c3aed;
            --accent-blue: #2563eb;
            --accent-green: #22c55e;
            --accent-orange: #f59e0b;
            --accent-gradient: linear-gradient(135deg, #7c3aed, #2563eb);
            --user-bubble: linear-gradient(135deg, #7c3aed, #6d28d9);
            --agent-bubble: rgba(30, 30, 60, 0.9);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; z-index: 0; pointer-events: none; }
        .bg-orb-1 { width: 500px; height: 500px; background: #7c3aed; top: -200px; right: -100px; }
        .bg-orb-2 { width: 400px; height: 400px; background: #2563eb; bottom: -150px; left: -100px; }

        /* Header */
        .wf-header {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        .wf-header-left { display: flex; align-items: center; gap: 14px; }
        .wf-avatar {
            width: 40px; height: 40px; border-radius: 10px;
            background: var(--accent-gradient);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .wf-header-info h2 { font-size: 15px; font-weight: 600; }
        .wf-header-meta { display: flex; gap: 8px; align-items: center; margin-top: 2px; }
        .wf-header-meta span { font-size: 11px; color: var(--text-dim); }
        .wf-topo-badge {
            padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .wf-topo-badge.sequential { background: rgba(37,99,235,0.15); color: #60a5fa; }
        .wf-topo-badge.parallel { background: rgba(16,185,129,0.15); color: #34d399; }
        .wf-topo-badge.supervisor { background: rgba(124,58,237,0.15); color: #a78bfa; }
        .wf-topo-badge.swarm { background: rgba(245,158,11,0.15); color: #fbbf24; }

        .wf-header-right { display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0; }
        .wf-llm-wrap { display: flex; flex-direction: column; gap: 2px; }
        .wf-llm-wrap label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
        .wf-llm-wrap select {
            padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-primary); font-size: 12px; font-family: 'Inter', sans-serif;
        }
        .btn-back {
            padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); cursor: pointer;
            font-size: 12px; font-family: 'Inter', sans-serif; transition: all 0.2s; text-decoration: none;
        }
        .btn-back:hover { background: rgba(124,58,237,0.1); color: var(--text-primary); }

        /* Topology Visualization */
        .topo-bar {
            display: flex; align-items: center; gap: 6px; padding: 8px 24px;
            background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border);
            overflow-x: auto; z-index: 10;
        }
        .topo-agent {
            display: flex; align-items: center; gap: 6px; padding: 4px 12px;
            border-radius: 20px; font-size: 11px; font-weight: 600;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            white-space: nowrap; transition: all 0.3s;
        }
        .topo-agent.active {
            background: rgba(124,58,237,0.15); border-color: var(--accent-purple);
            color: var(--accent-purple); box-shadow: 0 0 12px rgba(124,58,237,0.2);
        }
        .topo-agent.done {
            background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: var(--accent-green);
        }
        .topo-arrow { color: var(--text-dim); font-size: 12px; }

        /* Panels Row */
        .main-area { flex: 1; display: flex; overflow: hidden; position: relative; z-index: 5; }

        .messages-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px 24px; scroll-behavior: smooth; }
        .messages-container::-webkit-scrollbar { width: 6px; }
        .messages-container::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 3px; }

        /* Side Panel */
        .side-panel {
            width: 320px; background: var(--bg-secondary); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .side-panel.collapsed { width: 0; border: none; }
        .side-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .side-tab {
            flex: 1; padding: 8px; text-align: center; font-size: 11px; font-weight: 600;
            color: var(--text-dim); cursor: pointer; border: none; background: none;
            text-transform: uppercase; letter-spacing: 0.04em; transition: all 0.2s;
        }
        .side-tab.active { color: var(--accent-purple); border-bottom: 2px solid var(--accent-purple); }
        .side-content { flex: 1; overflow-y: auto; padding: 12px; }
        .side-content::-webkit-scrollbar { width: 5px; }
        .side-content::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 3px; }

        .state-item { margin-bottom: 10px; }
        .state-key {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            color: var(--accent-purple); letter-spacing: 0.06em; margin-bottom: 3px;
        }
        .state-value {
            font-size: 12px; color: var(--text-secondary); background: rgba(0,0,0,0.2);
            padding: 6px 8px; border-radius: 6px; word-break: break-word;
            font-family: 'JetBrains Mono', monospace; max-height: 120px; overflow-y: auto;
        }

        .log-entry {
            padding: 6px 8px; border-radius: 6px; margin-bottom: 6px;
            font-size: 11px; background: rgba(255,255,255,0.02);
            border-left: 3px solid var(--border);
        }
        .log-entry.delegate { border-left-color: var(--accent-purple); }
        .log-entry.handoff { border-left-color: var(--accent-orange); }
        .log-entry.state_update { border-left-color: var(--accent-green); }
        .log-entry .log-time { font-size: 9px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
        .log-entry .log-body { color: var(--text-secondary); margin-top: 2px; }
        .log-entry .log-agents {
            font-size: 10px; font-weight: 600; color: var(--text-primary);
        }

        /* Messages */
        .message { display: flex; margin-bottom: 14px; gap: 10px; max-width: 90%; animation: msgSlide 0.3s ease-out; }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { margin-left: auto; flex-direction: row-reverse; }
        .message-avatar {
            width: 30px; height: 30px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; flex-shrink: 0;
        }
        .message.agent .message-avatar { background: var(--accent-gradient); }
        .message.user .message-avatar { background: rgba(37,99,235,0.3); border: 1px solid rgba(37,99,235,0.5); }
        .message-content { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .message-agent-label { font-size: 10px; font-weight: 700; color: var(--accent-purple); text-transform: uppercase; letter-spacing: 0.04em; }
        .message-bubble {
            padding: 10px 14px; border-radius: 14px; line-height: 1.6;
            font-size: 13px; white-space: pre-wrap; word-break: break-word;
        }
        .message.agent .message-bubble { background: var(--agent-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .message.user .message-bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; color: #fff; }
        .message-path { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

        /* Status */
        .status-bar {
            display: none; align-items: center; gap: 8px;
            padding: 8px 24px; background: rgba(124,58,237,0.08);
            border-bottom: 1px solid var(--border); font-size: 12px; color: var(--accent-purple);
        }
        .status-bar.active { display: flex; }
        .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent-purple); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Welcome */
        .welcome-message { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .welcome-message .emoji { font-size: 42px; margin-bottom: 12px; }
        .welcome-message h3 { font-size: 17px; color: var(--text-primary); margin-bottom: 6px; }
        .welcome-message p { font-size: 13px; max-width: 500px; margin: 0 auto; line-height: 1.6; }

        /* Input */
        .input-area { position: relative; z-index: 10; padding: 14px 24px; background: var(--bg-secondary); border-top: 1px solid var(--border); }
        .input-wrapper { display: flex; gap: 10px; align-items: flex-end; max-width: 900px; margin: 0 auto; }
        .input-wrapper textarea {
            flex: 1; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-primary); font-family: 'Inter', sans-serif;
            font-size: 13px; resize: none; outline: none; min-height: 42px; max-height: 120px;
        }
        .input-wrapper textarea:focus { border-color: var(--accent-purple); }
        .input-wrapper textarea::placeholder { color: var(--text-dim); }
        .btn-send {
            width: 42px; height: 42px; border-radius: 12px; border: none;
            background: var(--accent-gradient); color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: all 0.2s; flex-shrink: 0;
        }
        .btn-send:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(124,58,237,0.4); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-panel-toggle {
            width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .side-panel { display: none; }
            .topo-bar { padding: 6px 12px; }
        }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <header class="wf-header">
        <div class="wf-header-left">
            <div class="wf-avatar">🔀</div>
            <div class="wf-header-info">
                <h2 id="wfName">Loading Workflow...</h2>
                <div class="wf-header-meta">
                    <span id="wfTopology" class="wf-topo-badge">...</span>
                    <span id="wfAgentCount"></span>
                </div>
            </div>
        </div>
        <div class="wf-header-right">
            <div class="wf-llm-wrap">
                <label for="wfChatLlmProvider">Provider</label>
                <select id="wfChatLlmProvider" title="Gemini (primary); OpenRouter; Ollama">
                    <option value="gemini" selected>Gemini (primary)</option>
                    <option value="openrouter">OpenRouter</option>
                    <option value="ollama">Ollama (local)</option>
                    <option value="ollama_remote">Ollama (remote)</option>
                </select>
            </div>
            <a href="/" class="btn-back">← Builder</a>
        </div>
    </header>

    <!-- Topology visualization bar -->
    <div class="topo-bar" id="topoBar"></div>

    <!-- Status -->
    <div class="status-bar" id="statusBar">
        <div class="spinner"></div>
        <span id="statusText">Routing through agents...</span>
    </div>

    <div class="main-area">
        <!-- Chat pane -->
        <div class="messages-pane">
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message" id="welcomeMessage">
                    <div class="emoji">🔀</div>
                    <h3 id="welcomeTitle">Loading workflow...</h3>
                    <p id="welcomeDesc">Connecting to agents...</p>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="chatInput" placeholder="Type your message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
                    <button class="btn-panel-toggle" onclick="togglePanel()" title="Toggle side panel">📊</button>
                </div>
            </div>
        </div>

        <!-- Side panel -->
        <div class="side-panel" id="sidePanel">
            <div class="side-tabs">
                <button class="side-tab active" onclick="switchSideTab('state')" id="tabState">Shared State</button>
                <button class="side-tab" onclick="switchSideTab('log')" id="tabLog">Execution Log</button>
            </div>
            <div class="side-content" id="sideContent">
                <div style="color:var(--text-dim);font-size:12px;padding:20px;text-align:center;">
                    State and logs will appear here during the conversation.
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        const params = new URLSearchParams(window.location.search);
        const workflowId = params.get('workflow_id');

        let conversationId = null;
        let wfInfo = null;
        let currentSideTab = 'state';

        if (!workflowId) {
            document.getElementById('welcomeTitle').textContent = 'No workflow ID';
            document.getElementById('welcomeDesc').textContent = 'Go back and build a workflow first.';
        } else {
            loadWorkflowInfo();
        }

        async function loadWorkflowInfo() {
            try {
                const res = await fetch(`${API_BASE}/workflow/${workflowId}/chat/info`);
                if (!res.ok) throw new Error('Failed to load workflow');
                wfInfo = await res.json();

                document.getElementById('wfName').textContent = wfInfo.name || wfInfo.workflow_id;
                const topoBadge = document.getElementById('wfTopology');
                topoBadge.textContent = wfInfo.topology;
                topoBadge.className = `wf-topo-badge ${wfInfo.topology}`;
                document.getElementById('wfAgentCount').textContent = `${(wfInfo.agents || []).length} agents`;

                document.getElementById('welcomeTitle').textContent = wfInfo.name || 'Workflow Ready';
                document.getElementById('welcomeDesc').textContent = wfInfo.description || wfInfo.user_query || '';

                renderTopoBar(wfInfo);
            } catch (e) {
                document.getElementById('welcomeTitle').textContent = 'Error';
                document.getElementById('welcomeDesc').textContent = e.message;
            }
        }

        function renderTopoBar(info) {
            const bar = document.getElementById('topoBar');
            const agents = info.agents || [];
            const topo = info.topology;
            let html = '';

            if (topo === 'sequential') {
                html = agents.map((a, i) => {
                    const arrow = i < agents.length - 1 ? '<span class="topo-arrow">→</span>' : '';
                    return `<div class="topo-agent" data-role="${esc(a.role)}">${esc(a.agent_name || a.role)}</div>${arrow}`;
                }).join('');
            } else if (topo === 'parallel') {
                const workers = agents.slice(0, -1);
                const merger = agents[agents.length - 1];
                html = workers.map(a =>
                    `<div class="topo-agent" data-role="${esc(a.role)}">${esc(a.agent_name || a.role)}</div>`
                ).join('');
                if (merger) {
                    html += `<span class="topo-arrow">→</span><div class="topo-agent" data-role="${esc(merger.role)}">${esc(merger.agent_name || merger.role)}</div>`;
                }
            } else if (topo === 'supervisor') {
                const sup = agents[0];
                html = `<div class="topo-agent" data-role="${esc(sup.role)}" style="border-color:var(--accent-purple);">👑 ${esc(sup.agent_name || sup.role)}</div>`;
                html += '<span class="topo-arrow">↔</span>';
                html += agents.slice(1).map(a =>
                    `<div class="topo-agent" data-role="${esc(a.role)}">${esc(a.agent_name || a.role)}</div>`
                ).join('');
            } else if (topo === 'swarm') {
                html = agents.map(a =>
                    `<div class="topo-agent" data-role="${esc(a.role)}">${esc(a.agent_name || a.role)}</div>`
                ).join('<span class="topo-arrow">↔</span>');
            }

            bar.innerHTML = html;
        }

        function highlightAgent(role) {
            document.querySelectorAll('.topo-agent').forEach(el => {
                el.classList.remove('active', 'done');
            });
            if (role) {
                const el = document.querySelector(`.topo-agent[data-role="${role}"]`);
                if (el) el.classList.add('active');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            const welcome = document.getElementById('welcomeMessage');
            if (welcome) welcome.style.display = 'none';

            addMessage(message, 'user');
            input.value = '';

            setStatus('Routing through agents...');
            document.getElementById('sendBtn').disabled = true;

            try {
                const res = await fetch(`${API_BASE}/workflow/${workflowId}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        conversation_id: conversationId,
                        llm_provider: document.getElementById('wfChatLlmProvider').value,
                    }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Chat failed');
                }

                const data = await res.json();
                conversationId = data.conversation_id;

                highlightAgent(data.current_agent);

                const agentName = getAgentName(data.responding_agent);
                const pathStr = data.execution_path.map(r => getAgentName(r)).join(' → ');

                addAgentMessage(data.response, agentName, pathStr, data.tool_calls_count);

                // Mark execution path agents as done in topo bar
                data.execution_path.forEach(r => {
                    const el = document.querySelector(`.topo-agent[data-role="${r}"]`);
                    if (el && r !== data.current_agent) el.classList.add('done');
                });

                updateSidePanel(data.shared_state);

            } catch (e) {
                addMessage(`Error: ${e.message}`, 'agent');
            } finally {
                clearStatus();
                document.getElementById('sendBtn').disabled = false;
                input.focus();
            }
        }

        function getAgentName(role) {
            if (!wfInfo || !wfInfo.agents) return role;
            const a = wfInfo.agents.find(a => a.role === role);
            return a ? (a.agent_name || role) : role;
        }

        function addMessage(text, type) {
            const container = document.getElementById('messagesContainer');
            const avatar = type === 'user' ? '👤' : '🤖';
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${esc(text)}</div>
                </div>
            `;
            container.appendChild(div);
            scrollToBottom();
        }

        function addAgentMessage(text, agentName, pathStr, toolCount) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = 'message agent';

            let toolNote = toolCount > 0 ? `<span style="font-size:10px;color:var(--accent-green);">🔧 ${toolCount} tool call(s)</span>` : '';

            div.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-agent-label">${esc(agentName)} ${toolNote}</div>
                    <div class="message-bubble">${esc(text)}</div>
                    <div class="message-path">Path: ${esc(pathStr)}</div>
                </div>
            `;
            container.appendChild(div);
            scrollToBottom();
        }

        function updateSidePanel(sharedState) {
            if (currentSideTab === 'state') renderStatePanel(sharedState);
        }

        function renderStatePanel(state) {
            const content = document.getElementById('sideContent');
            if (!state || Object.keys(state).length === 0) {
                content.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:20px;text-align:center;">No shared state yet.</div>';
                return;
            }
            content.innerHTML = Object.entries(state).map(([key, val]) => {
                const valStr = typeof val === 'object' ? JSON.stringify(val, null, 2) : String(val);
                const truncVal = valStr.length > 500 ? valStr.substring(0, 500) + '...' : valStr;
                return `<div class="state-item">
                    <div class="state-key">${esc(key)}</div>
                    <div class="state-value">${esc(truncVal)}</div>
                </div>`;
            }).join('');
        }

        async function renderLogPanel() {
            const content = document.getElementById('sideContent');
            if (!conversationId) {
                content.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:20px;text-align:center;">No execution log yet.</div>';
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/workflow/${workflowId}/chat/state?conversation_id=${conversationId}`);
                if (!res.ok) throw new Error('Failed to load state');
                const data = await res.json();

                const logs = data.execution_log || [];
                if (logs.length === 0) {
                    content.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:20px;text-align:center;">No log entries yet.</div>';
                    return;
                }

                content.innerHTML = logs.slice(-50).reverse().map(entry => {
                    const cls = entry.type || '';
                    const from = entry.from_agent || '?';
                    const to = entry.to_agent || '';
                    const arrowStr = to ? ` → ${to}` : '';
                    const dataStr = entry.data ? (entry.data.task || entry.data.reason || entry.data.preview || entry.data.key || '') : '';
                    const ts = entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString() : '';

                    return `<div class="log-entry ${esc(cls)}">
                        <div class="log-agents">${esc(entry.type)}: ${esc(from)}${esc(arrowStr)}</div>
                        ${dataStr ? `<div class="log-body">${esc(dataStr.substring(0, 200))}</div>` : ''}
                        <div class="log-time">${esc(ts)}</div>
                    </div>`;
                }).join('');
            } catch (e) {
                content.innerHTML = `<div style="color:var(--text-dim);font-size:12px;padding:20px;">${esc(e.message)}</div>`;
            }
        }

        function switchSideTab(tab) {
            currentSideTab = tab;
            document.getElementById('tabState').classList.toggle('active', tab === 'state');
            document.getElementById('tabLog').classList.toggle('active', tab === 'log');
            if (tab === 'log') {
                renderLogPanel();
            } else {
                renderStatePanel({});
                if (conversationId) {
                    fetch(`${API_BASE}/workflow/${workflowId}/chat/state?conversation_id=${conversationId}`)
                        .then(r => r.json())
                        .then(d => renderStatePanel(d.shared_state || {}))
                        .catch(() => {});
                }
            }
        }

        function togglePanel() {
            document.getElementById('sidePanel').classList.toggle('collapsed');
        }

        function setStatus(text) { document.getElementById('statusText').textContent = text; document.getElementById('statusBar').classList.add('active'); }
        function clearStatus() { document.getElementById('statusBar').classList.remove('active'); }
        function scrollToBottom() { const c = document.getElementById('messagesContainer'); setTimeout(() => { c.scrollTop = c.scrollHeight; }, 50); }
        function esc(str) { if (!str) return ''; const d = document.createElement('div'); d.appendChild(document.createTextNode(str)); return d.innerHTML; }

        document.getElementById('chatInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
